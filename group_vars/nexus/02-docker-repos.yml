---
nexus_config_docker: true
nexus_repos_docker_proxy:
  - name: docker-proxy
    http_port: "{{ nexus_docker_proxy_port }}"
    remote_url: https://registry-1.docker.io
    index_type: HUB
nexus_repos_docker_hosted:
  - name: docker-hosted
    http_port: "{{ nexus_docker_hosted_port }}"
    cleanup_policies:
      - docker_dev_aggressive_cleanup
nexus_repos_docker_group:
  - name: docker-group
    http_port: "{{ nexus_docker_group_port }}"
    member_repos:
      - docker-hosted
      - docker-proxy

nexus_repos_cleanup_policies:
  - name: docker_dev_aggressive_cleanup
    format: docker
    mode:
    notes: Cleanup for docker-hosted images with -dev tag suffix
    criteria:
      lastBlobUpdated: 14
      lastDownloaded: 14
      regexKey: ".*-dev$"
