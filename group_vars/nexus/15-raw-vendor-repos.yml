---
# Raw proxy: HashiCorp (Consul, Vault и др. zip), репозиторий пакетов MongoDB.
# npm/PM2 — по-прежнему npm-group (registry.npmjs.org), см. 03-npm-repos.yml.
nexus_config_raw: true
nexus_repos_raw_proxy:
  - name: ubuntu-archive
    remote_url: http://archive.ubuntu.com/ubuntu/
  - name: raw-hashicorp-releases
    remote_url: https://releases.hashicorp.com/
  - name: raw-mongodb-org
    remote_url: https://repo.mongodb.org/
nexus_repos_raw_hosted:
  - name: raw-internal
    version_policy: release
    write_policy: allow_once
nexus_repos_raw_group:
  - name: raw-all
    member_repos:
      - raw-internal
      - ubuntu-archive
      - raw-hashicorp-releases
      - raw-mongodb-org
