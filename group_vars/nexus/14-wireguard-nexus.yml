---
# WireGuard на хосте Nexus: конфиг templates/WG1.conf (локально, в .gitignore).
# Split-tunnel: общие списки в /etc/domains/domains и /etc/domains/static (nexus_wireguard_lists_dir); конфиг wg1.conf — в /etc/wireguard/.
# On-demand: wg1 обычно выключен; поднимается при трафике к FQDN из lists_dir (таймер nexus-wg-ondemand.timer).
nexus_wireguard_enable: true
nexus_wireguard_ondemand: true
